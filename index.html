<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    section {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }

    button {
      padding: 10px 15px;
      background: #333;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>

<body>

<header>
  <h1>My Portfolio</h1>
  <p>Hello! I'm a Web Developer</p>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <h2>About Me</h2>
  <div class="card">
    <p>I am a beginner web developer learning HTML, CSS, and JavaScript.</p>
  </div>
</section>

<section id="projects">
  <h2>My Projects</h2>

  <div class="card">
    <h3>Project 1</h3>
    <p>A simple website using HTML & CSS.</p>
  </div>

  <div class="card">
    <h3>Project 2</h3>
    <p>A JavaScript mini project.</p>
  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>

  <div class="card">
    <p>Email: example@email.com</p>
    <button onclick="showMessage()">Click Me</button>
  </div>
</section>

<footer>
  <p>© 2026 My Portfolio</p>
</footer>

<script>
  function showMessage() {
    alert("Thanks for visiting my portfolio!");
  }
</script>

</body>
</html>
